<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>功稀のページ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #202020;
  --border: #2a2a2a;
  --border2: #333;
  --accent: #c8a96e;
  --accent2: #e8c98e;
  --text: #e8e0d4;
  --muted: #6a6058;
  --muted2: #8a7868;
  --red: #c06060;
  --green: #6a9e7a;
  --blue: #6080a8;
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── LOGIN ─── */
#login-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  background-image: radial-gradient(ellipse at 30% 20%, rgba(200,169,110,0.04) 0%, transparent 60%),
                    radial-gradient(ellipse at 70% 80%, rgba(200,169,110,0.03) 0%, transparent 50%);
}
.login-box {
  width: 90%; max-width: 340px;
  text-align: center;
}
.login-logo {
  font-family: 'Shippori Mincho', serif;
  font-size: 2.8rem;
  color: var(--accent);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
  text-shadow: 0 0 40px rgba(200,169,110,0.3);
}
.login-sub {
  font-size: 0.78rem;
  color: var(--muted2);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 48px;
}
.login-input-wrap {
  position: relative;
  margin-bottom: 16px;
}
.login-input {
  width: 100%;
  padding: 16px 50px 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem;
  letter-spacing: 0.2em;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.login-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,169,110,0.1);
}
.toggle-pw {
  position: absolute; right: 16px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--muted2); cursor: pointer; font-size: 1rem;
  padding: 4px;
}
.login-btn {
  width: 100%;
  padding: 15px;
  background: var(--accent);
  color: #0f0f0f;
  border: none; border-radius: var(--radius);
  font-family: 'Shippori Mincho', serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}
.login-btn:hover { background: var(--accent2); transform: translateY(-1px); }
.login-error {
  color: var(--red);
  font-size: 0.82rem;
  margin-top: 12px;
  min-height: 20px;
  letter-spacing: 0.05em;
}
.login-attempts {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 8px;
}

/* ─── MAIN ─── */
#main-screen { display: none; }

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,15,15,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.header-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.1rem;
  color: var(--accent);
  letter-spacing: 0.1em;
}
.header-date {
  font-size: 0.75rem;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
}
.logout-btn {
  background: none; border: 1px solid var(--border2);
  color: var(--muted2); padding: 6px 12px;
  border-radius: 8px; font-size: 0.78rem;
  cursor: pointer; transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}
.logout-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ─── TABS ─── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1; min-width: 70px;
  padding: 13px 8px;
  text-align: center;
  font-size: 0.78rem;
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.2s;
  border: none; background: none;
  white-space: nowrap;
  letter-spacing: 0.05em;
  border-bottom: 2px solid transparent;
  font-family: 'Noto Sans JP', sans-serif;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* ─── PANELS ─── */
.panel { display: none; padding: 20px 16px; min-height: calc(100vh - 110px); }
.panel.active { display: block; }

/* ─── SECTION TITLE ─── */
.sec-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 1rem;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.sec-title::after {
  content: '';
  flex: 1; height: 1px;
  background: linear-gradient(to right, var(--border2), transparent);
}

/* ─── CARD ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

/* ─── WEATHER ─── */
.weather-main {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 16px;
}
.weather-icon { font-size: 3rem; }
.weather-temp {
  font-family: 'DM Mono', monospace;
  font-size: 2.5rem;
  color: var(--accent);
  font-weight: 500;
}
.weather-desc { font-size: 0.85rem; color: var(--muted2); margin-top: 2px; }
.weather-location { font-size: 0.75rem; color: var(--muted); }
.weather-details {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.weather-detail {
  background: var(--surface2);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
}
.weather-detail .label { font-size: 0.68rem; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.05em; }
.weather-detail .value { font-size: 0.9rem; font-family: 'DM Mono', monospace; color: var(--text); }
.weather-loading { color: var(--muted2); font-size: 0.9rem; text-align: center; padding: 20px; }
.today-info { margin-top: 16px; }
.today-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
}
.today-row:last-child { border-bottom: none; }
.today-row .k { color: var(--muted2); font-size: 0.78rem; }
.today-row .v { color: var(--text); font-family: 'DM Mono', monospace; }

/* ─── TODO ─── */
.todo-add {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.todo-add input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.todo-add input:focus { border-color: var(--accent); }
.todo-add input::placeholder { color: var(--muted); }
.btn-icon {
  width: 42px; height: 42px;
  background: var(--accent);
  border: none; border-radius: 10px;
  color: #0f0f0f; font-size: 1.2rem;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.btn-icon:hover { background: var(--accent2); }
.todo-filters {
  display: flex; gap: 6px; margin-bottom: 14px;
}
.filter-btn {
  padding: 5px 12px;
  border: 1px solid var(--border2);
  background: none; border-radius: 20px;
  font-size: 0.75rem; color: var(--muted2);
  cursor: pointer; transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.08); }
.todo-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  transition: all 0.2s;
  animation: fadeIn 0.2s ease;
}
.todo-item.done { opacity: 0.45; }
.todo-check {
  width: 20px; height: 20px;
  border: 1.5px solid var(--border2);
  border-radius: 6px;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-size: 0.7rem;
  background: none;
}
.todo-check.checked { background: var(--accent); border-color: var(--accent); color: #0f0f0f; }
.todo-text { flex: 1; font-size: 0.9rem; line-height: 1.4; }
.todo-item.done .todo-text { text-decoration: line-through; color: var(--muted); }
.todo-del {
  background: none; border: none;
  color: var(--muted); cursor: pointer; font-size: 0.85rem;
  padding: 4px; border-radius: 6px;
  transition: color 0.15s;
}
.todo-del:hover { color: var(--red); }
.todo-priority {
  width: 6px; height: 6px;
  border-radius: 50%; flex-shrink: 0;
}
.pri-high { background: var(--red); }
.pri-mid { background: var(--accent); }
.pri-low { background: var(--muted); }

/* ─── MEMO ─── */
.memo-tabs {
  display: flex; gap: 6px; margin-bottom: 14px;
  flex-wrap: wrap;
}
.memo-tab-btn {
  padding: 5px 14px;
  border: 1px solid var(--border2);
  background: none; border-radius: 20px;
  font-size: 0.8rem; color: var(--muted2);
  cursor: pointer; transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}
.memo-tab-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.08); }
.memo-editor {
  width: 100%;
  min-height: 200px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  line-height: 1.7;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
.memo-editor:focus { border-color: var(--accent); }
.memo-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px;
}
.memo-saved { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; }
.memo-add-btn {
  padding: 6px 14px;
  border: 1px dashed var(--border2);
  background: none; border-radius: 8px;
  font-size: 0.78rem; color: var(--muted2);
  cursor: pointer; transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}
.memo-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ─── CALENDAR ─── */
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.cal-nav {
  background: none; border: 1px solid var(--border2);
  color: var(--muted2); padding: 7px 14px;
  border-radius: 8px; cursor: pointer;
  font-size: 1rem; transition: all 0.2s;
}
.cal-nav:hover { border-color: var(--accent); color: var(--accent); }
.cal-month {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.1rem; color: var(--text); letter-spacing: 0.08em;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 3px; margin-bottom: 20px;
}
.cal-dname {
  text-align: center; font-size: 0.7rem;
  color: var(--muted); padding: 4px 0; letter-spacing: 0.05em;
}
.cal-dname:first-child { color: #c06060; }
.cal-dname:last-child { color: var(--blue); }
.cal-day {
  aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 8px; cursor: pointer;
  font-size: 0.82rem; position: relative;
  transition: all 0.15s; color: var(--text);
}
.cal-day:hover:not(.empty) { background: var(--surface2); }
.cal-day.today { background: rgba(200,169,110,0.15); color: var(--accent); font-weight: 700; border: 1px solid rgba(200,169,110,0.3); }
.cal-day.sunday { color: #c06060; }
.cal-day.saturday { color: var(--blue); }
.cal-day.today.sunday, .cal-day.today.saturday { color: var(--accent); }
.cal-day.has-event::after {
  content: ''; width: 4px; height: 4px;
  background: var(--accent); border-radius: 50%;
  position: absolute; bottom: 2px;
}
.event-list { display: flex; flex-direction: column; gap: 8px; }
.event-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 10px;
  animation: fadeIn 0.2s ease;
}
.event-date { font-size: 0.72rem; color: var(--muted2); font-family: 'DM Mono', monospace; }
.event-title-text { font-size: 0.9rem; }
.event-del {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 0.85rem; margin-left: auto;
  padding: 4px; transition: color 0.15s;
}
.event-del:hover { color: var(--red); }
.add-event-form {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px; margin-top: 10px;
  display: none; flex-direction: column; gap: 8px;
}
.add-event-form.open { display: flex; }
.add-event-form input {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 12px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.88rem; outline: none;
  transition: border-color 0.2s;
}
.add-event-form input:focus { border-color: var(--accent); }
.form-btns { display: flex; gap: 8px; }
.save-btn {
  flex: 1; padding: 9px;
  background: var(--accent); color: #0f0f0f;
  border: none; border-radius: 8px;
  font-family: 'Shippori Mincho', serif;
  font-size: 0.9rem; cursor: pointer;
  transition: background 0.2s;
}
.save-btn:hover { background: var(--accent2); }
.cancel-btn {
  padding: 9px 14px;
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted2); border-radius: 8px;
  font-size: 0.85rem; cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}
.cancel-btn:hover { border-color: var(--muted2); color: var(--text); }
.add-ev-btn {
  width: 100%; padding: 11px;
  border: 1px dashed var(--border2);
  background: none; border-radius: 10px;
  color: var(--muted2); font-size: 0.85rem;
  cursor: pointer; transition: all 0.2s;
  margin-top: 8px;
  font-family: 'Noto Sans JP', sans-serif;
}
.add-ev-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ─── TIMER ─── */
.timer-display {
  text-align: center; padding: 30px 20px;
}
.timer-clock {
  font-family: 'DM Mono', monospace;
  font-size: 4rem;
  color: var(--accent);
  letter-spacing: 0.05em;
  text-shadow: 0 0 40px rgba(200,169,110,0.2);
  margin-bottom: 24px;
}
.timer-btns {
  display: flex; justify-content: center; gap: 10px;
  margin-bottom: 24px;
}
.timer-btn {
  padding: 10px 24px;
  border-radius: 10px; border: 1px solid var(--border2);
  background: var(--surface); color: var(--text);
  font-family: 'Shippori Mincho', serif;
  font-size: 0.95rem; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.05em;
}
.timer-btn.start { background: var(--accent); color: #0f0f0f; border-color: var(--accent); }
.timer-btn:hover { opacity: 0.85; transform: translateY(-1px); }
.timer-presets {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  margin-bottom: 24px;
}
.preset-btn {
  padding: 9px 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted2);
  font-size: 0.8rem; cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Mono', monospace;
}
.preset-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ─── REMINDERS ─── */
.reminder-add {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 16px;
}
.reminder-add input {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 14px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.88rem; outline: none;
  transition: border-color 0.2s;
}
.reminder-add input:focus { border-color: var(--accent); }
.reminder-row { display: flex; gap: 8px; }
.reminder-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  animation: fadeIn 0.2s ease;
}
.reminder-time { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--accent); min-width: 80px; }
.reminder-text { flex: 1; font-size: 0.88rem; }
.reminder-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; transition: color 0.15s; }
.reminder-del:hover { color: var(--red); }

/* ─── EMPTY ─── */
.empty {
  text-align: center; padding: 32px 16px;
  color: var(--muted); font-size: 0.85rem;
}
.empty-icon { font-size: 2rem; display: block; margin-bottom: 8px; opacity: 0.5; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">功稀</div>
    <div class="login-sub">Personal Dashboard</div>
    <div class="login-input-wrap">
      <input type="password" class="login-input" id="pw-input"
        placeholder="パスワードを入力" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
      <button class="toggle-pw" onclick="togglePw()" id="pw-eye">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-attempts" id="login-attempts"></div>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div id="main-screen">
  <header>
    <div class="header-title">功稀のページ</div>
    <div class="header-date" id="header-date"></div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')" id="tab-today">🌤 今日</button>
    <button class="tab" onclick="switchTab('todo')" id="tab-todo">✅ ToDo</button>
    <button class="tab" onclick="switchTab('memo')" id="tab-memo">📝 メモ</button>
    <button class="tab" onclick="switchTab('calendar')" id="tab-calendar">📅 予定</button>
    <button class="tab" onclick="switchTab('timer')" id="tab-timer">⏱ タイマー</button>
  </div>

  <!-- ─ TODAY ─ -->
  <div class="panel active" id="today-panel">
    <div class="sec-title">天気</div>
    <div class="card" id="weather-card">
      <div class="weather-loading">📡 天気情報を取得中...</div>
    </div>
    <div class="sec-title">今日の情報</div>
    <div class="card today-info" id="today-info"></div>
  </div>

  <!-- ─ TODO ─ -->
  <div class="panel" id="todo-panel">
    <div class="sec-title">タスク</div>
    <div class="todo-add">
      <input type="text" id="todo-input" placeholder="新しいタスクを追加…" maxlength="60"
        onkeydown="if(event.key==='Enter')addTodo()">
      <select id="todo-pri" style="background:var(--surface);border:1px solid var(--border2);color:var(--muted2);border-radius:10px;padding:0 8px;font-size:0.78rem;outline:none;cursor:pointer;">
        <option value="mid">普通</option>
        <option value="high">高</option>
        <option value="low">低</option>
      </select>
      <button class="btn-icon" onclick="addTodo()">＋</button>
    </div>
    <div class="todo-filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('active',this)">未完了</button>
      <button class="filter-btn" onclick="setFilter('done',this)">完了済み</button>
    </div>
    <div id="todo-list"></div>
  </div>

  <!-- ─ MEMO ─ -->
  <div class="panel" id="memo-panel">
    <div class="sec-title">メモ</div>
    <div class="memo-tabs" id="memo-tabs"></div>
    <textarea class="memo-editor" id="memo-editor" placeholder="ここに自由にメモを書いてください…" oninput="saveMemo()"></textarea>
    <div class="memo-toolbar">
      <span class="memo-saved" id="memo-saved"></span>
      <button class="memo-add-btn" onclick="addMemoPage()">＋ 新しいページ</button>
    </div>
  </div>

  <!-- ─ CALENDAR ─ -->
  <div class="panel" id="calendar-panel">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <span class="cal-month" id="cal-month-label"></span>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="sec-title">今後の予定</div>
    <div id="event-list"></div>
    <button class="add-ev-btn" onclick="toggleEventForm()">＋ 予定を追加</button>
    <div class="add-event-form" id="add-event-form">
      <input type="date" id="ev-date">
      <input type="text" id="ev-title" placeholder="予定の内容" maxlength="30">
      <div class="form-btns">
        <button class="save-btn" onclick="addEvent()">保存</button>
        <button class="cancel-btn" onclick="toggleEventForm()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- ─ TIMER ─ -->
  <div class="panel" id="timer-panel">
    <div class="sec-title">タイマー</div>
    <div class="timer-display">
      <div class="timer-clock" id="timer-clock">00:00</div>
      <div class="timer-presets">
        <button class="preset-btn" onclick="setPreset(1)">1分</button>
        <button class="preset-btn" onclick="setPreset(3)">3分</button>
        <button class="preset-btn" onclick="setPreset(5)">5分</button>
        <button class="preset-btn" onclick="setPreset(10)">10分</button>
        <button class="preset-btn" onclick="setPreset(15)">15分</button>
        <button class="preset-btn" onclick="setPreset(25)">25分</button>
        <button class="preset-btn" onclick="setPreset(30)">30分</button>
        <button class="preset-btn" onclick="setPreset(60)">60分</button>
      </div>
      <div class="timer-btns">
        <button class="timer-btn start" id="timer-start-btn" onclick="toggleTimer()">スタート</button>
        <button class="timer-btn" onclick="resetTimer()">リセット</button>
      </div>
    </div>
    <div class="sec-title">リマインダー</div>
    <div class="reminder-add">
      <input type="text" id="rem-text" placeholder="リマインダーの内容">
      <div class="reminder-row">
        <input type="datetime-local" id="rem-time" style="flex:1">
        <button class="btn-icon" onclick="addReminder()" style="height:42px">＋</button>
      </div>
    </div>
    <div id="reminder-list"></div>
  </div>
</div>

<script>
// ════ SECURITY ════
const HASH_KEY = 'kouki_pw_hash';
const SESSION_KEY = 'kouki_session';
const ATTEMPTS_KEY = 'kouki_attempts';
const LOCKOUT_KEY = 'kouki_lockout';
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 5 * 60 * 1000; // 5分

// Simple hash (SHA-256-like substitute using btoa for demo; real deploy should use SubtleCrypto)
async function hashPw(pw) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(pw + 'kouki_salt_2024'));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Store hashed password on first run
async function initPassword() {
  if (!localStorage.getItem(HASH_KEY)) {
    // Default password — user should change
    const h = await hashPw('13240622Ko');
    localStorage.setItem(HASH_KEY, h);
  }
}

function getAttempts() { return parseInt(localStorage.getItem(ATTEMPTS_KEY) || '0'); }
function getLockout() { return parseInt(localStorage.getItem(LOCKOUT_KEY) || '0'); }

async function doLogin() {
  const now = Date.now();
  const lockout = getLockout();
  if (lockout && now < lockout) {
    const rem = Math.ceil((lockout - now) / 1000);
    document.getElementById('login-error').textContent = `🔒 ロックアウト中 (${rem}秒後に再試行)`;
    return;
  }
  if (lockout && now >= lockout) {
    localStorage.removeItem(LOCKOUT_KEY);
    localStorage.removeItem(ATTEMPTS_KEY);
  }

  const pw = document.getElementById('pw-input').value;
  const entered = await hashPw(pw);
  const stored = localStorage.getItem(HASH_KEY);

  if (entered === stored) {
    localStorage.removeItem(ATTEMPTS_KEY);
    localStorage.removeItem(LOCKOUT_KEY);
    sessionStorage.setItem(SESSION_KEY, 'ok');
    showMain();
  } else {
    const attempts = getAttempts() + 1;
    localStorage.setItem(ATTEMPTS_KEY, attempts);
    if (attempts >= MAX_ATTEMPTS) {
      localStorage.setItem(LOCKOUT_KEY, Date.now() + LOCKOUT_MS);
      document.getElementById('login-error').textContent = '🔒 5分間ロックアウトされました';
      document.getElementById('login-attempts').textContent = '';
    } else {
      document.getElementById('login-error').textContent = 'パスワードが違います';
      document.getElementById('login-attempts').textContent = `残り ${MAX_ATTEMPTS - attempts} 回`;
    }
    document.getElementById('pw-input').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-error').textContent = '';
}

function togglePw() {
  const inp = document.getElementById('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showMain() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  initMain();
}

// ════ INIT ════
initPassword();
if (sessionStorage.getItem(SESSION_KEY) === 'ok') showMain();

// Lockout timer refresh
setInterval(() => {
  const lockout = getLockout();
  if (lockout && Date.now() < lockout) {
    const rem = Math.ceil((lockout - Date.now()) / 1000);
    document.getElementById('login-error').textContent = `🔒 ロックアウト中 (${rem}秒後に再試行)`;
  }
}, 1000);

// ════ TABS ════
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name + '-panel').classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ════ MAIN INIT ════
function initMain() {
  updateHeaderDate();
  loadWeather();
  renderTodayInfo();
  renderTodos();
  renderMemo();
  renderCalendar();
  renderEvents();
  renderReminders();
  setInterval(updateHeaderDate, 60000);
  setInterval(checkReminders, 30000);
}

// ════ DATE ════
const WEEKDAYS = ['日','月','火','水','木','金','土'];
function updateHeaderDate() {
  const d = new Date();
  const str = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${WEEKDAYS[d.getDay()]})`;
  document.getElementById('header-date').textContent = str;
}
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ════ WEATHER (Open-Meteo 無料API) ════
async function loadWeather() {
  try {
    // 大井町 (埼玉県大井) 周辺
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.9&longitude=139.3&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=1');
    const data = await res.json();
    const cur = data.current;
    const daily = data.daily;

    const wc = cur.weather_code;
    const icon = weatherIcon(wc);
    const desc = weatherDesc(wc);

    document.getElementById('weather-card').innerHTML = `
      <div class="weather-main">
        <div class="weather-icon">${icon}</div>
        <div>
          <div class="weather-temp">${Math.round(cur.temperature_2m)}°</div>
          <div class="weather-desc">${desc}</div>
          <div class="weather-location">埼玉県大井</div>
        </div>
      </div>
      <div class="weather-details">
        <div class="weather-detail"><div class="label">体感</div><div class="value">${Math.round(cur.apparent_temperature)}°C</div></div>
        <div class="weather-detail"><div class="label">湿度</div><div class="value">${cur.relative_humidity_2m}%</div></div>
        <div class="weather-detail"><div class="label">風速</div><div class="value">${cur.wind_speed_10m}m/s</div></div>
        <div class="weather-detail"><div class="label">最高</div><div class="value">${Math.round(daily.temperature_2m_max[0])}°C</div></div>
        <div class="weather-detail"><div class="label">最低</div><div class="value">${Math.round(daily.temperature_2m_min[0])}°C</div></div>
        <div class="weather-detail"><div class="label">更新</div><div class="value" style="font-size:0.7rem">${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</div></div>
      </div>
    `;
  } catch {
    document.getElementById('weather-card').innerHTML = '<div class="weather-loading">天気情報を取得できませんでした</div>';
  }
}

function weatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 2) return '🌤️';
  if (code <= 3) return '☁️';
  if (code <= 49) return '🌫️';
  if (code <= 59) return '🌧️';
  if (code <= 69) return '🌨️';
  if (code <= 79) return '❄️';
  if (code <= 84) return '🌧️';
  if (code <= 94) return '⛈️';
  return '🌩️';
}
function weatherDesc(code) {
  if (code === 0) return '快晴';
  if (code <= 2) return '晴れ時々曇り';
  if (code <= 3) return '曇り';
  if (code <= 49) return '霧';
  if (code <= 59) return '小雨';
  if (code <= 69) return 'みぞれ';
  if (code <= 79) return '雪';
  if (code <= 84) return '雨';
  if (code <= 94) return '雷雨';
  return '激しい雷雨';
}

function renderTodayInfo() {
  const d = new Date();
  const year = d.getFullYear();
  const start = new Date(year, 0, 1);
  const dayOfYear = Math.floor((d - start) / 86400000) + 1;
  const daysLeft = 366 - dayOfYear;

  document.getElementById('today-info').innerHTML = `
    <div class="today-row"><span class="k">今日</span><span class="v">${year}年${d.getMonth()+1}月${d.getDate()}日 (${WEEKDAYS[d.getDay()]})</span></div>
    <div class="today-row"><span class="k">今年の残り日数</span><span class="v">${daysLeft} 日</span></div>
    <div class="today-row"><span class="k">今年 ${d.getMonth()+1} 月の残り</span><span class="v">${new Date(year, d.getMonth()+1, 0).getDate() - d.getDate()} 日</span></div>
    <div class="today-row"><span class="k">今週 (月曜起算)</span><span class="v">${Math.ceil(d.getDate()/7)} 週目</span></div>
  `;
}

// ════ TODO ════
const TODO_KEY = 'kouki_todos';
let todoFilter = 'all';

function getTodos() { try { return JSON.parse(localStorage.getItem(TODO_KEY)) || []; } catch { return []; } }
function saveTodosData(t) { localStorage.setItem(TODO_KEY, JSON.stringify(t)); }

function addTodo() {
  const input = document.getElementById('todo-input');
  const text = input.value.trim();
  if (!text) return;
  const pri = document.getElementById('todo-pri').value;
  const todos = getTodos();
  todos.unshift({ id: Date.now().toString(), text, done: false, pri, created: Date.now() });
  saveTodosData(todos);
  input.value = '';
  renderTodos();
}

function setFilter(f, el) {
  todoFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTodos();
}

function toggleTodo(id) {
  const todos = getTodos().map(t => t.id === id ? {...t, done: !t.done} : t);
  saveTodosData(todos);
  renderTodos();
}
function deleteTodo(id) {
  saveTodosData(getTodos().filter(t => t.id !== id));
  renderTodos();
}

function renderTodos() {
  let todos = getTodos();
  if (todoFilter === 'active') todos = todos.filter(t => !t.done);
  if (todoFilter === 'done') todos = todos.filter(t => t.done);
  const list = document.getElementById('todo-list');
  if (todos.length === 0) {
    list.innerHTML = '<div class="empty"><span class="empty-icon">✅</span>タスクはありません</div>';
    return;
  }
  list.innerHTML = todos.map(t => `
    <div class="todo-item ${t.done ? 'done' : ''}">
      <div class="todo-priority pri-${t.pri}"></div>
      <button class="todo-check ${t.done ? 'checked' : ''}" onclick="toggleTodo('${t.id}')">${t.done ? '✓' : ''}</button>
      <span class="todo-text">${escHtml(t.text)}</span>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">✕</button>
    </div>
  `).join('');
}

// ════ MEMO ════
const MEMO_KEY = 'kouki_memos';
let currentMemoPage = 0;

function getMemos() { try { return JSON.parse(localStorage.getItem(MEMO_KEY)) || [{title:'メモ 1', content:''}]; } catch { return [{title:'メモ 1',content:''}]; } }
function saveMemos(m) { localStorage.setItem(MEMO_KEY, JSON.stringify(m)); }

function addMemoPage() {
  const memos = getMemos();
  memos.push({ title: `メモ ${memos.length + 1}`, content: '' });
  saveMemos(memos);
  currentMemoPage = memos.length - 1;
  renderMemo();
}

function switchMemoPage(i) {
  const memos = getMemos();
  memos[currentMemoPage].content = document.getElementById('memo-editor').value;
  saveMemos(memos);
  currentMemoPage = i;
  renderMemo();
}

let memoSaveTimer;
function saveMemo() {
  const memos = getMemos();
  memos[currentMemoPage].content = document.getElementById('memo-editor').value;
  saveMemos(memos);
  clearTimeout(memoSaveTimer);
  document.getElementById('memo-saved').textContent = '保存中…';
  memoSaveTimer = setTimeout(() => {
    document.getElementById('memo-saved').textContent = '✓ 保存済み';
  }, 600);
}

function renderMemo() {
  const memos = getMemos();
  if (currentMemoPage >= memos.length) currentMemoPage = 0;
  const tabsEl = document.getElementById('memo-tabs');
  tabsEl.innerHTML = memos.map((m, i) => `
    <button class="memo-tab-btn ${i === currentMemoPage ? 'active' : ''}" onclick="switchMemoPage(${i})">${m.title}</button>
  `).join('');
  document.getElementById('memo-editor').value = memos[currentMemoPage].content;
  document.getElementById('memo-saved').textContent = '';
}

// ════ CALENDAR ════
const EVT_KEY = 'kouki_events';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function getEvents() { try { return JSON.parse(localStorage.getItem(EVT_KEY)) || []; } catch { return []; } }
function saveEventsData(e) { localStorage.setItem(EVT_KEY, JSON.stringify(e)); }

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${calYear}年 ${calMonth + 1}月`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['日','月','火','水','木','金','土'].forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'cal-dname';
    el.textContent = d;
    grid.appendChild(el);
  });
  const first = new Date(calYear, calMonth, 1).getDay();
  const days = new Date(calYear, calMonth + 1, 0).getDate();
  const events = getEvents();
  const todayStr = toDateStr(new Date());
  for (let i = 0; i < first; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
  }
  for (let d = 1; d <= days; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(calYear, calMonth, d).getDay();
    const el = document.createElement('div');
    let cls = 'cal-day';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';
    if (ds === todayStr) cls += ' today';
    if (events.some(e => e.date === ds)) cls += ' has-event';
    el.className = cls; el.textContent = d;
    el.onclick = () => { document.getElementById('ev-date').value = ds; toggleEventForm(true); };
    grid.appendChild(el);
  }
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar(); renderEvents();
}

function renderEvents() {
  const today = toDateStr(new Date());
  const upcoming = getEvents().filter(e => e.date >= today).sort((a,b) => a.date.localeCompare(b.date));
  const list = document.getElementById('event-list');
  if (upcoming.length === 0) {
    list.innerHTML = '<div class="empty"><span class="empty-icon">📅</span>予定はありません</div>';
    return;
  }
  list.innerHTML = upcoming.map(ev => {
    const d = new Date(ev.date + 'T00:00:00');
    const label = `${d.getMonth()+1}/${d.getDate()} (${WEEKDAYS[d.getDay()]})`;
    return `<div class="event-item">
      <div><div class="event-date">${label}</div><div class="event-title-text">${escHtml(ev.title)}</div></div>
      <button class="event-del" onclick="deleteEvent('${ev.id}')">✕</button>
    </div>`;
  }).join('');
}

function toggleEventForm(open) {
  const form = document.getElementById('add-event-form');
  if (open === true) form.classList.add('open');
  else form.classList.toggle('open');
  if (form.classList.contains('open')) document.getElementById('ev-title').focus();
}

function addEvent() {
  const date = document.getElementById('ev-date').value;
  const title = document.getElementById('ev-title').value.trim();
  if (!date || !title) { alert('日付と内容を入力してください'); return; }
  const evts = getEvents();
  evts.push({ id: Date.now().toString(), date, title });
  saveEventsData(evts);
  document.getElementById('ev-date').value = '';
  document.getElementById('ev-title').value = '';
  document.getElementById('add-event-form').classList.remove('open');
  renderCalendar(); renderEvents();
}

function deleteEvent(id) {
  if (!confirm('この予定を削除しますか？')) return;
  saveEventsData(getEvents().filter(e => e.id !== id));
  renderCalendar(); renderEvents();
}

// ════ TIMER ════
let timerSec = 0, timerRunning = false, timerInterval = null, timerInit = 0;

function setPreset(min) {
  if (timerRunning) return;
  timerSec = min * 60;
  timerInit = timerSec;
  updateTimerDisplay();
}

function toggleTimer() {
  if (timerSec <= 0 && !timerRunning) return;
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning = false;
    document.getElementById('timer-start-btn').textContent = '再開';
  } else {
    timerRunning = true;
    document.getElementById('timer-start-btn').textContent = '一時停止';
    timerInterval = setInterval(() => {
      if (timerSec > 0) { timerSec--; updateTimerDisplay(); }
      else {
        clearInterval(timerInterval); timerRunning = false;
        document.getElementById('timer-start-btn').textContent = 'スタート';
        document.getElementById('timer-clock').textContent = '00:00';
        alert('⏰ タイマー終了！');
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval); timerRunning = false;
  timerSec = timerInit;
  updateTimerDisplay();
  document.getElementById('timer-start-btn').textContent = 'スタート';
}

function updateTimerDisplay() {
  const m = Math.floor(timerSec / 60);
  const s = timerSec % 60;
  document.getElementById('timer-clock').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ════ REMINDERS ════
const REM_KEY = 'kouki_reminders';
function getReminders() { try { return JSON.parse(localStorage.getItem(REM_KEY)) || []; } catch { return []; } }
function saveReminders(r) { localStorage.setItem(REM_KEY, JSON.stringify(r)); }

function addReminder() {
  const text = document.getElementById('rem-text').value.trim();
  const time = document.getElementById('rem-time').value;
  if (!text || !time) { alert('内容と時刻を入力してください'); return; }
  const rems = getReminders();
  rems.push({ id: Date.now().toString(), text, time, notified: false });
  rems.sort((a,b) => a.time.localeCompare(b.time));
  saveReminders(rems);
  document.getElementById('rem-text').value = '';
  document.getElementById('rem-time').value = '';
  renderReminders();
}

function deleteReminder(id) {
  saveReminders(getReminders().filter(r => r.id !== id));
  renderReminders();
}

function renderReminders() {
  const rems = getReminders();
  const list = document.getElementById('reminder-list');
  if (rems.length === 0) {
    list.innerHTML = '<div class="empty"><span class="empty-icon">🔔</span>リマインダーはありません</div>';
    return;
  }
  list.innerHTML = rems.map(r => {
    const d = new Date(r.time);
    const label = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="reminder-item">
      <span class="reminder-time">${label}</span>
      <span class="reminder-text">${escHtml(r.text)}</span>
      <button class="reminder-del" onclick="deleteReminder('${r.id}')">✕</button>
    </div>`;
  }).join('');
}

function checkReminders() {
  const now = new Date();
  const rems = getReminders();
  let changed = false;
  rems.forEach(r => {
    if (!r.notified && new Date(r.time) <= now) {
      alert(`🔔 リマインダー：${r.text}`);
      r.notified = true; changed = true;
    }
  });
  if (changed) { saveReminders(rems); renderReminders(); }
}

// ════ UTILS ════
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
